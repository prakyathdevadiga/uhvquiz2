        .limit-input-wrapper {

            gap: 15px;

        }

        input[type="number"] {
            width: 120px;
            padding: 12px 20px;

            text-align: center;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .limit-info {
            color: #888;
            font-size: 0.9rem;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .question-counter {
            text-align: right;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 500;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .option:hover:not(.disabled):not(.revealed) {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #e8ecff;
        }

        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            animation: correctPulse 0.5s ease;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #ffebee;
            animation: shake 0.5s ease;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option.revealed {
            cursor: default;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }

        }

        .feedback-banner.correct {

            color: #2e7d32;

    </style>
</head>
<body>
    <div class="container">
        <!-- Setup Section -->

            <h1>🎯 UHV Unit II Quiz</h1>
            <p class="subtitle">Test your knowledge of Human Values</p>
            
            <div class="question-limit-section">
                <label for="questionLimit">How many questions would you like to attempt?</label>
                <div class="limit-input-wrapper">
                    <input type="number" id="questionLimit" min="1" max="55" value="10">

                </div>
            </div>
            
            <div style="text-align: center;">
                <button class="btn" onclick="startQuiz()">Start Quiz</button>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection" class="card quiz-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="question-counter" id="questionCounter">Question 1 of 10</div>
            
            <div class="question-text" id="questionText">Loading...</div>
            
            <!-- Feedback Banner -->

            <div class="options-container" id="optionsContainer"></div>
            
            <div class="nav-buttons">
                <button class="btn-secondary" id="prevBtn" onclick="previousQuestion()" style="visibility: hidden;">← Previous</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="card results-section">
            <h1>Quiz Completed! 🎉</h1>
            
            <div class="score-circle">
                <div class="score-inner">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Score</div>
                </div>
            </div>
            
            <div class="result-message" id="resultMessage"></div>
            <div class="result-details" id="resultDetails"></div>
            
            <div style="text-align: center;">
                <button class="btn" onclick="restartQuiz()">Try Again</button>

        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let questionLimit = 10;
        let hasAnsweredCurrent = false;

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function randomizeOptions(question) {
            const optionsWithIndex = question.options.map((opt, idx) => ({
                text: opt,
                originalIndex: idx
            }));
            
            const shuffledOptions = shuffleArray(optionsWithIndex);
            const newCorrectIndex = shuffledOptions.findIndex(opt => opt.originalIndex === question.correct);
            
            return {
                question: question.question,
                options: shuffledOptions.map(opt => opt.text),
                correct: newCorrectIndex,
                originalCorrect: question.options[question.correct]
            };
        }

        function startQuiz() {
            const limitInput = document.getElementById('questionLimit');
            questionLimit = parseInt(limitInput.value) || 10;
            
            if (questionLimit < 1) questionLimit = 1;
            if (questionLimit > originalQuestions.length) questionLimit = originalQuestions.length;
            
            // Shuffle and select questions
            const shuffledQuestions = shuffleArray(originalQuestions).slice(0, questionLimit);
            
            // Randomize options for each question
            questions = shuffledQuestions.map(q => randomizeOptions(q));
            
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            hasAnsweredCurrent = false;
            
            // Hide setup, show quiz
            document.getElementById('setupSection').style.display = 'none';
            const quizSection = document.getElementById('quizSection');
            quizSection.style.display = 'block';
            quizSection.classList.add('fade-in');
            
            displayQuestion();
        }

        function displayQuestion() {
            const question = questions[currentQuestionIndex];
            hasAnsweredCurrent = userAnswers[currentQuestionIndex] !== null;
            
            // Hide feedback banner
            const feedbackBanner = document.getElementById('feedbackBanner');
            feedbackBanner.className = 'feedback-banner';
            feedbackBanner.style.display = 'none';
            
            // Update progress
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Update counter
            document.getElementById('questionCounter').textContent = 
                `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            
            // Display question
            document.getElementById('questionText').textContent = 
                `${currentQuestionIndex + 1}. ${question.question}`;
            
            // Display options
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.dataset.index = index;
                
                // If already answered, show the result
                if (hasAnsweredCurrent) {
                    optionDiv.classList.add('revealed', 'disabled');
                    if (index === question.correct) {
                        optionDiv.classList.add('correct');
                    } else if (index === userAnswers[currentQuestionIndex]) {
                        optionDiv.classList.add('incorrect');
                    }
                } else if (userAnswers[currentQuestionIndex] === index) {
                    optionDiv.classList.add('selected');
                }
                
                let iconHtml = '';
                if (hasAnsweredCurrent) {
                    if (index === question.correct) {
                        iconHtml = '<span class="option-icon">✓</span>';
                    } else if (index === userAnswers[currentQuestionIndex]) {
                        iconHtml = '<span class="option-icon">✗</span>';
                    }
                }
                
                optionDiv.innerHTML = `
                    <div class="option-letter">${letters[index]}</div>
                    <div class="option-text">${option}</div>
                    ${iconHtml}
                `;
                
                if (!hasAnsweredCurrent) {
                    optionDiv.onclick = function() { selectOption(index); };
                }
                
                optionsContainer.appendChild(optionDiv);
            });
            
            // Show feedback if already answered
            if (hasAnsweredCurrent) {
                showFeedback(userAnswers[currentQuestionIndex] === question.correct);
            }
            
            // Update navigation buttons
            document.getElementById('prevBtn').style.visibility = 
                currentQuestionIndex === 0 ? 'hidden' : 'visible';
            
            const nextBtn = document.getElementById('nextBtn');
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.textContent = 'Finish →';
            } else {
                nextBtn.textContent = 'Next →';
            }
        }

        function selectOption(index) {
            if (hasAnsweredCurrent) return;
            
            const question = questions[currentQuestionIndex];
            const isCorrect = index === question.correct;
            
            userAnswers[currentQuestionIndex] = index;
            hasAnsweredCurrent = true;
            
            // Update visual selection and reveal correct answer
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.add('revealed', 'disabled');
                opt.onclick = null;
                
                if (i === question.correct) {
                    opt.classList.add('correct');
                    opt.innerHTML += '<span class="option-icon">✓</span>';
                } else if (i === index) {
                    opt.classList.add('incorrect');
                    opt.innerHTML += '<span class="option-icon">✗</span>';
                }
            });
            
            // Show feedback banner
            showFeedback(isCorrect);
        }

        function showFeedback(isCorrect) {
            const feedbackBanner = document.getElementById('feedbackBanner');
            feedbackBanner.style.display = 'block';
            
            if (isCorrect) {
                feedbackBanner.className = 'feedback-banner correct';
                feedbackBanner.innerHTML = '✓ Correct! Well done!';
            } else {
                const correctOption = questions[currentQuestionIndex].options[questions[currentQuestionIndex].correct];
                feedbackBanner.className = 'feedback-banner incorrect';
                feedbackBanner.innerHTML = `✗ Incorrect! The correct answer is: <strong>${correctOption}</strong>`;
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizSection').style.display = 'none';
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.style.display = 'block';
            resultsSection.classList.add('fade-in');
            
            // Calculate score
            let correctCount = 0;
            questions.forEach((q, i) => {
                if (userAnswers[i] === q.correct) {
                    correctCount++;
                }
            });
            
            const percentage = Math.round((correctCount / questions.length) * 100);
            
            // Animate score
            animateScore(percentage);
            
            // Set message
            let message = '';
            if (percentage >= 80) {
                message = 'Outstanding! Excellent understanding! 🌟';
            } else if (percentage >= 60) {
                message = 'Good job! Keep learning! 👍';
            } else if (percentage >= 40) {
                message = 'Not bad! Room for improvement! 📚';
            } else {
                message = 'Keep practicing! You can do better! 💪';
            }
            
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultDetails').textContent = 
                `You answered ${correctCount} out of ${questions.length} questions correctly`;
            
            // Show review
            showReview();
        }

        function animateScore(targetPercentage) {
            const scoreElement = document.getElementById('scoreNumber');
            let current = 0;
            const increment = targetPercentage / 50;
            const timer = setInterval(function() {
                current += increment;
                if (current >= targetPercentage) {
                    current = targetPercentage;
                    clearInterval(timer);
                }
                scoreElement.textContent = Math.round(current) + '%';
            }, 20);
        }

        function showReview() {
            const reviewSection = document.getElementById('reviewSection');
            reviewSection.innerHTML = '<h3 style="margin-bottom: 20px; color: #333;">Review Answers</h3>';
            
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.correct;
                const userAnswer = userAnswers[i] !== null ? q.options[userAnswers[i]] : 'Not answered';
                const correctAnswer = q.options[q.correct];
                
                const reviewItem = document.createElement('div');
                reviewItem.className = 'review-item ' + (isCorrect ? 'correct-review' : 'incorrect-review');
                
                reviewItem.innerHTML = `
                    <div class="review-question">${i + 1}. ${q.question}</div>
                    <div class="review-answer">
                        <strong>Your answer:</strong> ${userAnswer} ${isCorrect ? '✓' : '✗'}<br>
                        ${!isCorrect ? `<strong>Correct answer:</strong> ${correctAnswer}` : ''}
                    </div>
                `;
                
                reviewSection.appendChild(reviewItem);
            });
        }

        function restartQuiz() {
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('setupSection').style.display = 'block';
            
            // Reset variables
            questions = [];
            currentQuestionIndex = 0;
            userAnswers = [];
            hasAnsweredCurrent = false;
        }

        // Allow Enter key to start quiz
        document.getElementById('questionLimit').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startQuiz();
            }
        });
    </script>
</body>
</html>
